<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 專家決策團</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#081120;
    color:white;
}

.header{
    padding:30px 20px;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.subtitle{
    color:#7aa7ff;
    margin-top:8px;
}

.container{
    width:92%;
    max-width:900px;
    margin:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    margin-top:25px;
}

.card{
    background:#13233f;
    border-radius:20px;
    padding:25px;
    cursor:pointer;
    transition:.3s;
    border:1px solid rgba(255,255,255,.08);
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 25px rgba(0,162,255,.35);
}

.icon{
    font-size:42px;
}

.title{
    font-size:26px;
    margin-top:18px;
    font-weight:bold;
}

.desc{
    color:#c5d1e8;
    margin-top:12px;
    line-height:1.6;
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#101b33;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
    border-top:1px solid rgba(255,255,255,.08);
}

.footer div{
    text-align:center;
    color:#8fb4ff;
}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
AI 專家決策團
</div>

<div class="subtitle">
選擇一個領域，開始你的 AI 決策分析
</div>

</div>

<div class="container">

<div class="grid">

<div class="card">
<div class="icon">🏠</div>
<div class="title">生活</div>
<div class="desc">
讓生活更有秩序、更有效率。
</div>
</div>

<div class="card">
<div class="icon">📈</div>
<div class="title">理財</div>
<div class="desc">
讓錢替你工作，而不是替錢煩惱。
</div>
</div>

<div class="card">
<div class="icon">✈️</div>
<div class="title">旅遊</div>
<div class="desc">
規劃安心又省錢的旅行。
</div>
</div>

<div class="card">
<div class="icon">🍜</div>
<div class="title">美食</div>
<div class="desc">
找到值得品嚐的美食。
</div>
</div>

<div class="card">
<div class="icon">📢</div>
<div class="title">行銷</div>
<div class="desc">
提升曝光，增加品牌影響力。
</div>
</div>

<div class="card">
<div class="icon">🤔</div>
<div class="title">選擇困難</div>
<div class="desc">
交給 AI 協助你做決策。
</div>
</div>

</div>

</div>

<div class="footer">

<div>🏠<br>首頁</div>

<div>⭐<br>專家</div>

<div>📋<br>紀錄</div>

</div>

</body>
</html>
