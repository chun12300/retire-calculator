<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>人生RPG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#08111f;

font-family:"Microsoft JhengHei";

color:white;

}

.header{

padding:40px;

text-align:center;

}

.header h1{

font-size:56px;

color:#FFD66B;

}

.header p{

margin-top:15px;

font-size:22px;

color:#bbb;

}

.container{

width:1200px;

max-width:95%;

margin:auto;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:25px;

margin-top:40px;

}

.card{

background:#13233d;

border-radius:25px;

padding:30px;

transition:.3s;

cursor:pointer;

border:2px solid rgba(255,255,255,.08);

box-shadow:0 0 25px rgba(0,0,0,.3);

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 30px rgba(0,180,255,.45);

}

.icon{

font-size:58px;

margin-bottom:20px;

}

.card h2{

font-size:30px;

margin-bottom:12px;

}

.card p{

color:#bfc8d6;

line-height:1.7;

}

button{

margin-top:25px;

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#2a6cff;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#4d89ff;

}

</style>

</head>

<body>

<div class="header">

<h1>人生RPG</h1>

<p>每天，都升級一點點。</p>

</div>

<div class="container">

<div class="grid">
    <div class="card">
    <div class="icon">💰</div>
    <h2>投資有富</h2>
    <p>讓錢替你工作，而不是替錢工作。</p>
    <button>進入領域</button>
</div>

<div class="card">
    <div class="icon">🍜</div>
    <h2>百匯饗宴</h2>
    <p>今天想吃什麼？探索世界的美味。</p>
    <button>進入領域</button>
</div>

<div class="card">
    <div class="icon">😂</div>
    <h2>人生迷因</h2>
    <p>笑一下，再繼續冒險。</p>
    <button>進入領域</button>
</div>

<div class="card">
    <div class="icon">💪</div>
    <h2>獨自升級</h2>
    <p>每天進步一點點，就是最大的勝利。</p>
    <button>進入領域</button>
</div>

<div class="card">
    <div class="icon">🗺️</div>
    <h2>地圖解鎖</h2>
    <p>去沒去過的地方，遇見新的自己。</p>
    <button>進入領域</button>
</div>

</div>

</body>

</html>
