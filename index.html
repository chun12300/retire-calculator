<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生RPG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{

background:linear-gradient(180deg,#07111f,#0d1830,#111d3d);

color:white;

min-height:100vh;

}

.hero{

padding:70px 25px 40px;

text-align:center;

}

.logo{

font-size:58px;

font-weight:bold;

color:#FFD66B;

letter-spacing:3px;

}

.subtitle{

margin-top:15px;

font-size:22px;

color:#B8C5D9;

}

.player{

width:330px;

max-width:90%;

margin:45px auto;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:22px;

padding:25px;

border:1px solid rgba(255,255,255,.08);

}

.level{

font-size:28px;

font-weight:bold;

margin-bottom:15px;

}

.bar{

height:16px;

background:#253550;

border-radius:30px;

overflow:hidden;

}

.exp{

width:35%;

height:100%;

background:linear-gradient(90deg,#00d4ff,#00ff95);

}

.expText{

margin-top:10px;

color:#AFC6E9;

}

.start{

margin-top:35px;

padding:16px 35px;

font-size:18px;

border:none;

border-radius:40px;

background:linear-gradient(90deg,#4B7CFF,#39C7FF);

color:white;

cursor:pointer;

transition:.3s;

}

.start:hover{

transform:scale(1.05);

box-shadow:0 0 25px rgba(0,180,255,.5);

}

</style>

</head>

<body>

<div class="hero">

<div class="logo">

⚔️ 人生RPG

</div>

<div class="subtitle">

每一天，都是新的任務。

</div>

<div class="player">

<div class="level">

Lv.1　冒險者

</div>

<div class="bar">

<div class="exp"></div>

</div>

<div class="expText">

EXP 120 / 500

</div>

</div>

<button class="start">

開始今天的冒險

</button>

</div>

</body>
</html>
