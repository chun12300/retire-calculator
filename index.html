<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETF定期定額計算器</title>

<style>
body{
    font-family: Microsoft JhengHei;
    background:#f5f7fa;
}

.container{
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:30px;
    background:#eef4ff;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>ETF定期定額計算器</h1>

<label>每月投入金額（元）</label>
<input type="number" id="monthly">

<label>投資年數</label>
<input type="number" id="years">

<label>年化報酬率 (%)</label>
<input type="number" id="rate" value="8">

<button onclick="calculate()">
開始計算
</button>

<div class="result" id="result">
請輸入資料後計算
</div>

</div>

<script>

function calculate(){

let monthly =
parseFloat(document.getElementById("monthly").value);

let years =
parseFloat(document.getElementById("years").value);

let rate =
parseFloat(document.getElementById("rate").value)/100;

let months = years * 12;

let totalInvest =
monthly * months;

let futureValue = 0;

let monthlyRate = rate / 12;

for(let i=0;i<months;i++){

futureValue =
(futureValue + monthly)
* (1 + monthlyRate);

}

let profit =
futureValue - totalInvest;

document.getElementById("result").innerHTML=

`
<h3>計算結果</h3>

<p>總投入：
<b>${Math.round(totalInvest).toLocaleString()} 元</b></p>

<p>預估資產：
<b>${Math.round(futureValue).toLocaleString()} 元</b></p>

<p>預估獲利：
<b>${Math.round(profit).toLocaleString()} 元</b></p>
`;

}

</script>

</body>
</html>
